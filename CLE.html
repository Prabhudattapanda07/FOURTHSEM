vidual, organizational, and societal levels:<br><br><strong>At the Individual Level</strong><br>â€¢ Practicing good digital hygiene â€” strong passwords, privacy settings, skeptical information consumption<br>â€¢ Respecting others' digital rights â€” not trolling, not doxxing, not spreading disinformation<br>â€¢ Using AI tools transparently â€” disclosing AI-generated content, not using AI to deceive others<br>â€¢ Taking responsibility for the social impacts of one's online behavior<br><br><strong>At the Organizational Level</strong><br>â€¢ Implementing privacy-by-design in all digital products and services<br>â€¢ Regular cybersecurity training for all employees<br>â€¢ Establishing clear ethical guidelines for AI development and deployment<br>â€¢ Transparent data use policies and genuine user consent mechanisms<br>â€¢ Responsible disclosure of security vulnerabilities<br>â€¢ Creating ethical review processes for high-impact AI applications<br><br><strong>At the Societal/Government Level</strong><br>â€¢ Comprehensive cyber regulations with clear enforcement mechanisms<br>â€¢ AI governance frameworks balancing innovation with accountability<br>â€¢ Digital literacy education from primary school through higher education<br>â€¢ International cooperation on cybercrime and AI governance<br>â€¢ Digital inclusion programs reducing the digital divide<br>â€¢ Independent oversight bodies for critical AI applications<br><br><strong>5. Ethics in the Information Society</strong><br>The information society â€” where data is the primary resource and digital technology mediates most human activity â€” creates specific ethical obligations:<br><br>â€¢ <strong>Data Ownership</strong> â€” Individuals should have meaningful control over their personal data<br>â€¢ <strong>Algorithmic Accountability</strong> â€” Organizations using algorithms for consequential decisions must be accountable for outcomes<br>â€¢ <strong>Digital Rights as Human Rights</strong> â€” Privacy, free expression, and access to information online are extensions of fundamental human rights<br>â€¢ <strong>Environmental Responsibility</strong> â€” Digital technology's significant carbon footprint demands responsible energy use choices<br><br><strong>6. Conclusion</strong><br>Cyber ethics and AI ethics are not obstacles to technological progress â€” they are the essential frameworks that make sustainable, trustworthy, and genuinely beneficial technological progress possible. As AI systems become more autonomous and powerful, and as digital technologies permeate every domain of human life, the ethical principles governing their development and use become ever more consequential. Building a digital society worth living in requires that technical capability be matched with moral wisdom â€” ensuring that the extraordinary power of modern technology serves human dignity, justice, and flourishing rather than exploitation, inequality, and harm.`},
    ]
  }
}
};

  return /<[a-z][\s\S]*>/i.test(answer) ? answer : `<p>${answer}</p>`;
}

function buildHome() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';

  Object.keys(DATA).forEach(key => {
    const module = DATA[key];
    const marks = Object.keys(module.marks).sort((a, b) => +a - +b);
    const chips = marks.map(mark => {
      const chipClass = markClass(mark);
      return `<span class="chip ${chipClass}">${mark} Marks x ${module.marks[mark].length}</span>`;
    }).join('');

    grid.innerHTML += `
      <div class="mc m${key}" onclick="openModule(${key})">
        <div class="cn">Module ${key}</div>
        <div class="ct">${module.sub}</div>
        <div class="cd">${MODULE_DESCRIPTIONS[key]}</div>
        <div class="cf">${chips}</div>
      </div>`;
  });
}

function openModule(moduleNumber) {
  currentModule = moduleNumber;
  currentMarks = null;

  const module = DATA[moduleNumber];
  hide('view-home');
  show('view-module');

  document.getElementById('module-title').textContent = `${module.title} - ${module.sub}`;
  document.getElementById('module-subtitle').textContent = MODULE_DESCRIPTIONS[moduleNumber];

  const grid = document.getElementById('marks-grid');
  const marks = Object.keys(module.marks).sort((a, b) => +a - +b);

  grid.innerHTML = marks.map(mark => {
    const markType = questionClass(mark);
    const part = +mark === 2 ? 'A' : +mark === 5 ? 'B' : 'C';
    return `
      <div class="mkc ${markType}" id="mc-${mark}" onclick="openMarks(${mark})">
        <span class="mv">${mark}</span>
        <span class="ml">Marks</span>
        <div class="mc2">${module.marks[mark].length} Questions &middot; Part ${part}</div>
      </div>`;
  }).join('');

  document.getElementById('qcontainer').innerHTML = '';
  updateNav();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openMarks(mark) {
  currentMarks = +mark;
  document.querySelectorAll('.mkc').forEach(card => card.classList.remove('active'));

  const activeCard = document.getElementById(`mc-${mark}`);
  if (activeCard) activeCard.classList.add('active');

  const questions = DATA[currentModule].marks[mark] || [];
  const type = questionClass(mark);
  const part = +mark === 2 ? 'A' : +mark === 5 ? 'B' : 'C';
  const container = document.getElementById('qcontainer');

  container.innerHTML = `
    <div class="mst"><span>${mark}-Mark Questions</span>- ${questions.length} Questions &middot; Part ${part}</div>
    <div class="toolbar">
      <button class="tbtn" onclick="expandAll()">&#9660; Expand All</button>
      <button class="tbtn" onclick="collapseAll()">&#9650; Collapse All</button>
    </div>
    <div class="qlist">
      ${questions.map((item, index) => `
        <div class="qi ${type}" id="q${index}" onclick="toggleQuestion(${index})">
          <div class="qh">
            <span class="qn">${String.fromCharCode(65 + index)}</span>
            <span class="qt">${item.q.replace(/\n/g, '<br>')}</span>
            <span class="qtg">+</span>
          </div>
          <div class="qa">
            <div class="albl">Answer</div>
            <div class="ab">${formatAnswer(item.a)}</div>
          </div>
        </div>`).join('')}
    </div>`;

  updateNav();
  setTimeout(() => container.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function toggleQuestion(index) {
  const item = document.getElementById(`q${index}`);
  if (item) item.classList.toggle('open');
}

function expandAll() {
  document.querySelectorAll('.qi').forEach(item => item.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.qi').forEach(item => item.classList.remove('open'));
}

function goBack() {
  if (currentMarks !== null) {
    currentMarks = null;
    document.getElementById('qcontainer').innerHTML = '';
    document.querySelectorAll('.mkc').forEach(card => card.classList.remove('active'));
  } else if (currentModule !== null) {
    currentModule = null;
    hide('view-module');
    show('view-home');
  }

  updateNav();
}

function show(id) {
  const element = document.getElementById(id);
  element.style.display = 'block';
  element.className = 'view';
}

function hide(id) {
  document.getElementById(id).style.display = 'none';
}

function goHome() {
  currentModule = null;
  currentMarks = null;
  hide('view-module');
  show('view-home');
  document.getElementById('qcontainer').innerHTML = '';
  updateNav();
}

function goToModule() {
  if (currentModule === null) return;
  currentMarks = null;
  document.getElementById('qcontainer').innerHTML = '';
  document.querySelectorAll('.mkc').forEach(card => card.classList.remove('active'));
  updateNav();
}

function updateNav() {
  const backButton = document.getElementById('back-btn');
  const breadcrumb = document.getElementById('breadcrumb');

  if (currentModule === null) {
    backButton.style.display = 'none';
    breadcrumb.innerHTML = '<span class="active">Home</span>';
    return;
  }

  backButton.style.display = 'flex';
  const moduleLabel = `Module ${currentModule}`;

  if (currentMarks === null) {
    breadcrumb.innerHTML = `<span class="lnk" onclick="goHome()">Home</span><span class="sep">&rsaquo;</span><span class="active">${moduleLabel}</span>`;
    return;
  }

  breadcrumb.innerHTML = `<span class="lnk" onclick="goHome()">Home</span><span class="sep">&rsaquo;</span><span class="lnk" onclick="goToModule()">${moduleLabel}</span><span class="sep">&rsaquo;</span><span class="active">${currentMarks} Marks</span>`;
}

buildHome();
updateNav();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FSD Question Bank — GEC Bhubaneswar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & Base ────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0e1a;
    --bg2:       #0f1525;
    --bg3:       #141c30;
    --card:      #161e30;
    --card-h:    #1b2540;
    --border:    #1f2d4a;
    --border-h:  #2e4070;
    --accent:    #4f8ef7;
    --accent2:   #7b5cf7;
    --accent3:   #2de6c6;
    --accent4:   #f7a94f;
    --text:      #e2e8f4;
    --text2:     #8fa8cc;
    --text3:     #4a6080;
    --green:     #22d3a3;
    --red:       #f75a5a;
    --yellow:    #f7c948;
    --radius:    14px;
    --radius-sm: 8px;
    --shadow:    0 4px 24px rgba(0,0,0,.45);
    --shadow-h:  0 8px 40px rgba(79,142,247,.15);
    --trans:     .25s cubic-bezier(.4,0,.2,1);
    --font:      'Space Grotesk', sans-serif;
    --mono:      'JetBrains Mono', monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── Noise texture overlay ───────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: .4;
  }

  /* ── Gradient blobs ──────────────────────────────── */
  .blob {
    position: fixed; border-radius: 50%;
    filter: blur(80px); pointer-events: none; z-index: 0;
    animation: float 12s ease-in-out infinite;
  }
  .blob-1 { width: 400px; height: 400px; background: rgba(79,142,247,.07); top: -100px; right: -100px; animation-delay: 0s; }
  .blob-2 { width: 350px; height: 350px; background: rgba(123,92,247,.06); bottom: -80px; left: -80px; animation-delay: -4s; }
  .blob-3 { width: 300px; height: 300px; background: rgba(45,230,198,.05); top: 50%; left: 50%; animation-delay: -8s; }
  @keyframes float { 0%,100%{transform:translate(0,0)} 33%{transform:translate(30px,-20px)} 66%{transform:translate(-20px,30px)} }

  /* ── Layout wrapper ──────────────────────────────── */
  .wrapper {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* ── Header ──────────────────────────────────────── */
  header {
    padding: 40px 0 32px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
  }

  .badge {
    display: inline-block;
    font-size: .72rem; font-weight: 600; letter-spacing: .1em;
    text-transform: uppercase; color: var(--accent);
    background: rgba(79,142,247,.1);
    border: 1px solid rgba(79,142,247,.2);
    border-radius: 40px; padding: 4px 14px;
    margin-bottom: 16px;
  }

  h1 {
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 700; color: var(--text);
    letter-spacing: -.02em;
    margin-bottom: 8px;
  }
  h1 span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

  .subtitle {
    font-size: .9rem; color: var(--text2);
    display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap;
  }
  .subtitle .dot { width: 3px; height: 3px; background: var(--text3); border-radius: 50%; }

  /* ── Breadcrumb ──────────────────────────────────── */
  #breadcrumb {
    display: flex; align-items: center; gap: 8px;
    font-size: .82rem; color: var(--text3);
    margin-bottom: 28px;
    min-height: 28px;
    transition: opacity var(--trans);
  }
  #breadcrumb span { color: var(--text2); }
  #breadcrumb .sep { color: var(--text3); }
  #breadcrumb .crumb-active { color: var(--accent); }

  /* ── Back Button ─────────────────────────────────── */
  .nav-actions {
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap; margin-bottom: 32px;
  }
  .home-btn,
  #back-btn {
    align-items: center; gap: 8px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text2); font-family: var(--font);
    font-size: .85rem; font-weight: 500;
    padding: 8px 18px; border-radius: 40px;
    transition: all var(--trans);
  }
  .home-btn { display: inline-flex; text-decoration: none; }
  #back-btn { display: none; cursor: pointer; }
  .home-btn:hover,
  #back-btn:hover { background: var(--card-h); border-color: var(--accent); color: var(--accent); transform: translateX(-3px); }
  .home-btn svg,
  #back-btn svg { transition: transform var(--trans); }
  .home-btn:hover svg,
  #back-btn:hover svg { transform: translateX(-3px); }

  /* ── Views ───────────────────────────────────────── */
  .view { display: none; animation: fadeUp .35s ease both; }
  .view.active { display: block; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

  /* ── Module Cards ────────────────────────────────── */
  .modules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  .module-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px 24px;
    cursor: pointer;
    transition: all var(--trans);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; gap: 12px;
  }
  .module-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--card-h), transparent);
    opacity: 0; transition: opacity var(--trans);
  }
  .module-card:hover { border-color: var(--border-h); transform: translateY(-4px); box-shadow: var(--shadow-h); }
  .module-card:hover::before { opacity: 1; }

  .module-card .m-num {
    font-size: .72rem; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase;
  }
  .module-card .m-title { font-size: 1.1rem; font-weight: 700; }
  .module-card .m-desc { font-size: .82rem; color: var(--text2); line-height: 1.55; }
  .module-card .m-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .chip {
    font-size: .7rem; font-weight: 600;
    padding: 3px 10px; border-radius: 20px;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.08);
    color: var(--text2);
  }

  /* card accent colors */
  .mc-1 .m-num { color: var(--accent); }
  .mc-1:hover { border-color: rgba(79,142,247,.4); box-shadow: 0 8px 40px rgba(79,142,247,.12); }
  .mc-2 .m-num { color: var(--accent2); }
  .mc-2:hover { border-color: rgba(123,92,247,.4); box-shadow: 0 8px 40px rgba(123,92,247,.12); }
  .mc-3 .m-num { color: var(--accent3); }
  .mc-3:hover { border-color: rgba(45,230,198,.4); box-shadow: 0 8px 40px rgba(45,230,198,.12); }
  .mc-4 .m-num { color: var(--accent4); }
  .mc-4:hover { border-color: rgba(247,169,79,.4); box-shadow: 0 8px 40px rgba(247,169,79,.12); }

  /* ── Marks Section ───────────────────────────────── */
  .marks-header {
    margin-bottom: 28px;
  }
  .marks-header h2 {
    font-size: 1.5rem; font-weight: 700; margin-bottom: 4px;
  }
  .marks-header p { font-size: .88rem; color: var(--text2); }

  .marks-tabs {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .marks-tab {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 22px; border-radius: 40px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text2);
    font-family: var(--font); font-size: .85rem; font-weight: 600;
    cursor: pointer; transition: all var(--trans);
  }
  .marks-tab:hover { border-color: var(--border-h); color: var(--text); }
  .marks-tab.active { background: rgba(79,142,247,.12); border-color: var(--accent); color: var(--accent); }
  .marks-tab .tab-badge {
    font-size: .68rem; font-weight: 700;
    background: rgba(255,255,255,.07);
    border-radius: 10px; padding: 1px 8px; color: var(--text3);
  }
  .marks-tab.active .tab-badge { background: rgba(79,142,247,.15); color: var(--accent); }

  /* ── Questions List ──────────────────────────────── */
  .q-section { display: none; animation: fadeUp .3s ease both; }
  .q-section.active { display: block; }

  .q-section-title {
    font-size: .78rem; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text3);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .q-section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .q-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color var(--trans);
  }
  .q-item:hover { border-color: var(--border-h); }
  .q-item.open { border-color: var(--border-h); }

  .q-trigger {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
    position: relative;
  }

  .q-num {
    font-size: .7rem; font-weight: 700;
    font-family: var(--mono);
    color: var(--text3);
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 8px;
    white-space: nowrap; margin-top: 2px; flex-shrink: 0;
  }

  .q-text {
    flex: 1;
    font-size: .92rem; font-weight: 500; color: var(--text);
    line-height: 1.55;
  }

  .q-chevron {
    flex-shrink: 0; width: 20px; height: 20px;
    color: var(--text3);
    transition: transform var(--trans), color var(--trans);
    margin-top: 2px;
  }
  .q-item.open .q-chevron { transform: rotate(180deg); color: var(--accent); }

  .q-answer {
    max-height: 0; overflow: hidden;
    transition: max-height .4s cubic-bezier(.4,0,.2,1), opacity .3s ease;
    opacity: 0;
  }
  .q-item.open .q-answer { max-height: 2000px; opacity: 1; }

  .q-answer-inner {
    padding: 0 20px 20px 52px;
    font-size: .88rem; color: var(--text2);
    line-height: 1.75;
    border-top: 1px solid var(--border);
    padding-top: 16px;
    margin-top: -4px;
  }

  /* answer content formatting */
  .q-answer-inner p { margin-bottom: 10px; }
  .q-answer-inner p:last-child { margin-bottom: 0; }
  .q-answer-inner strong { color: var(--text); font-weight: 600; }
  .q-answer-inner ul { padding-left: 18px; margin: 8px 0; }
  .q-answer-inner ul li { margin-bottom: 5px; }
  .q-answer-inner code {
    font-family: var(--mono);
    font-size: .82em;
    background: rgba(255,255,255,.06);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 1px 6px;
    color: var(--accent3);
  }
  .q-answer-inner pre {
    font-family: var(--mono);
    font-size: .8rem;
    background: #0d1322;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    overflow-x: auto;
    margin: 12px 0;
    color: #a9d4ff;
    line-height: 1.65;
    white-space: pre;
  }
  .q-answer-inner pre .kw  { color: #c792ea; }
  .q-answer-inner pre .fn  { color: #82aaff; }
  .q-answer-inner pre .str { color: #c3e88d; }
  .q-answer-inner pre .cmt { color: #546e7a; }
  .q-answer-inner pre .num { color: #f78c6c; }
  .q-answer-inner table {
    width: 100%; border-collapse: collapse; margin: 12px 0;
    font-size: .82rem;
  }
  .q-answer-inner table th {
    background: rgba(79,142,247,.1);
    color: var(--text);
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .q-answer-inner table td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(255,255,255,.04);
    color: var(--text2);
  }
  .q-answer-inner table tr:last-child td { border-bottom: none; }

  /* ── Footer ──────────────────────────────────────── */
  footer {
    text-align: center; padding: 40px 20px 20px;
    font-size: .78rem; color: var(--text3);
    border-top: 1px solid var(--border);
    margin-top: 60px;
  }

  /* ── Responsive ──────────────────────────────────── */
  @media (max-width: 600px) {
    .modules-grid { grid-template-columns: 1fr; }
    .q-answer-inner { padding-left: 20px; }
    h1 { font-size: 1.5rem; }
    .marks-tab { padding: 8px 16px; font-size: .8rem; }
  }

  /* ── Progress indicator ──────────────────────────── */
  .progress-bar {
    position: fixed; top: 0; left: 0; height: 2px; z-index: 100;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0; transition: width .3s ease;
  }
</style>
</head>
<body>
<div class="progress-bar" id="progress"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="wrapper">
  <!-- Header -->
  <header>
    <div class="badge">B.Tech IV Semester · GEC Autonomous Bhubaneswar</div>
    <h1>Full Stack <span>Development-2</span></h1>
    <p class="subtitle">
      <span>Question Bank</span>

    </p>
  </header>

  <!-- Breadcrumb -->
  <div id="breadcrumb"></div>

  <div class="nav-actions">
    <a class="home-btn" href="index.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>

    </a>

    <!-- Back Button -->
    <button id="back-btn" onclick="goBack()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>

    </button>
  </div>

  <!-- VIEW: Home -->
  <div class="view active" id="view-home">
    <div class="modules-grid" id="modules-grid"></div>

  <!-- VIEW: Module -->
  <div class="view" id="view-module">
    <div class="marks-header">
      <h2 id="mod-heading"></h2>
      <p id="mod-subheading"></p>
    </div>
    <div class="marks-tabs" id="marks-tabs"></div>
    <div id="questions-container"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   DATA — All 96 questions with answers
   Structure: data[moduleKey][marksKey] = [{q, a}]
═══════════════════════════════════════════════════════ */
const data = {

  /* ────────────── MODULE 1 ────────────── */
  mod1: {
    "2": [
      {
        q: "Differentiate SQL vs NoSQL in terms of schema.",
        a: `<strong>SQL (Relational):</strong> Uses a fixed, predefined schema. Tables have defined columns with strict data types. Schema must be designed before inserting data.<br><br>
<strong>NoSQL (Non-Relational):</strong> Uses a dynamic schema (schema-less). Documents can have different fields. MongoDB, for example, allows flexible JSON-like documents where fields can vary per record.<br><br>
<strong>Key Difference:</strong> SQL enforces structure upfront; NoSQL allows structure to evolve over time.`
      },
      {
        q: "Show how to create a new database in MongoDB shell.",
        a: `In MongoDB shell, use the <code>use</code> command to create or switch to a database:<br><br>
<pre><span class="cmt">// Switch to (or create) a database named 'mydb'</span>
<span class="kw">use</span> mydb</pre>
MongoDB does not physically create the database until at least one document is inserted:<br><br>
<pre>db.users.<span class="fn">insertOne</span>({ name: <span class="str">"Alice"</span> })</pre>
After insertion, the database <code>mydb</code> is created and stored.`
      },
      {
        q: "Write the command to list all databases in MongoDB shell and show the command to connect to a specific database.",
        a: `<strong>List all databases:</strong>
<pre><span class="fn">show</span> dbs</pre>
<strong>Connect to a specific database:</strong>
<pre><span class="kw">use</span> databaseName
<span class="cmt">// Example:</span>
<span class="kw">use</span> school</pre>
After <code>use school</code>, all subsequent commands operate on the <code>school</code> database. Use <code>db</code> to verify the currently selected database.`
      },
      {
        q: "Identify the difference between insertOne() and insertMany().",
        a: `<table>
<tr><th>insertOne()</th><th>insertMany()</th></tr>
<tr><td>Inserts a single document</td><td>Inserts multiple documents at once</td></tr>
<tr><td>Takes one object as argument</td><td>Takes an array of objects</td></tr>
<tr><td><code>db.col.insertOne({name:"A"})</code></td><td><code>db.col.insertMany([{name:"A"},{name:"B"}])</code></td></tr>
<tr><td>Returns one insertedId</td><td>Returns array of insertedIds</td></tr>
</table>`
      },
      {
        q: "Compare $or and $and operators with examples.",
        a: `<strong>$or:</strong> Returns documents that match <em>at least one</em> condition.
<pre>db.users.<span class="fn">find</span>({ <span class="str">$or</span>: [{ age: <span class="num">20</span> }, { city: <span class="str">"Delhi"</span> }] })</pre>
Returns users who are age 20 <em>or</em> live in Delhi.<br><br>
<strong>$and:</strong> Returns documents that match <em>all</em> conditions.
<pre>db.users.<span class="fn">find</span>({ <span class="str">$and</span>: [{ age: <span class="num">20</span> }, { city: <span class="str">"Delhi"</span> }] })</pre>
Returns users who are age 20 <em>and</em> live in Delhi.`
      },
      {
        q: "Explain why sorting is important in queries and explain the use of descending sort.",
        a: `<strong>Importance:</strong> Sorting organizes query results in a meaningful order — e.g., newest records first, highest scores first. Without sorting, MongoDB returns documents in natural (insertion) order.<br><br>
<strong>Descending sort</strong> uses <code>-1</code>:
<pre>db.students.<span class="fn">find</span>().<span class="fn">sort</span>({ marks: <span class="num">-1</span> })</pre>
This returns students ordered from highest marks to lowest. Use <code>1</code> for ascending order.`
      },
      {
        q: "Write a query to show only name and age fields and combine sort and limit in a query example.",
        a: `<strong>Projection — show only name and age:</strong>
<pre>db.students.<span class="fn">find</span>({}, { name: <span class="num">1</span>, age: <span class="num">1</span>, _id: <span class="num">0</span> })</pre>
<strong>Combine sort and limit:</strong>
<pre>db.students
  .<span class="fn">find</span>()
  .<span class="fn">sort</span>({ age: <span class="num">-1</span> })
  .<span class="fn">limit</span>(<span class="num">5</span>)</pre>
Returns the 5 oldest students. <code>sort()</code> is applied before <code>limit()</code>.`
      },
      {
        q: "What is aggregation in MongoDB and explain the role of $match in aggregation.",
        a: `<strong>Aggregation</strong> is a pipeline-based framework for processing and transforming documents. It performs operations like filtering, grouping, sorting, and computing.<br><br>
<strong>$match</strong> filters documents — similar to <code>find()</code> — but inside an aggregation pipeline:
<pre>db.orders.<span class="fn">aggregate</span>([
  { <span class="str">$match</span>: { status: <span class="str">"completed"</span> } },
  { <span class="str">$group</span>: { _id: <span class="str">"$customerId"</span>, total: { <span class="str">$sum</span>: <span class="str">"$amount"</span> } } }
])</pre>
<code>$match</code> should be placed early in the pipeline to improve performance by reducing documents processed downstream.`
      },
      {
        q: "Compare $sort in queries vs aggregation.",
        a: `<table>
<tr><th>Feature</th><th>Query sort()</th><th>Aggregation $sort</th></tr>
<tr><td>Usage</td><td><code>.sort({field:1})</code></td><td><code>{ $sort: {field:1} }</code></td></tr>
<tr><td>Context</td><td>Used with find()</td><td>Used inside aggregate pipeline</td></tr>
<tr><td>Position</td><td>Appended after find()</td><td>Can be placed anywhere in pipeline</td></tr>
<tr><td>Combined with</td><td>limit(), skip()</td><td>$limit, $skip stages</td></tr>
</table>`
      },
      {
        q: "What is user authentication and explain the purpose of roles in MongoDB.",
        a: `<strong>User Authentication:</strong> The process of verifying the identity of a user before granting access to the database. MongoDB uses username/password credentials.<br><br>
<strong>Roles</strong> define what a user can do after authentication (authorization). Common roles:
<ul>
<li><code>read</code> — Can only read data</li>
<li><code>readWrite</code> — Can read and write</li>
<li><code>dbAdmin</code> — Administrative tasks</li>
<li><code>root</code> — Full access to everything</li>
</ul>
Roles enforce the principle of least privilege — users get only the permissions they need.`
      },

function openModule(key) {
  currentModule = key
  const mod = modules.find(m => m.key === key)
  currentMark = mod.marks[0]

  document.getElementById('mod-heading').textContent = `${mod.num} — ${mod.title}`
  document.getElementById('mod-subheading').textContent = `${mod.chips.join('  ·  ')}`

  // Tabs
  const tabsEl = document.getElementById('marks-tabs')
  tabsEl.innerHTML = mod.marks.map(m => `
    <button class="marks-tab ${m === currentMark ? 'active' : ''}"
      onclick="switchMark('${m}', this)">
      ${m} Marks
      <span class="tab-badge">${data[key][m] ? data[key][m].length : 0} Qs</span>
    </button>
  `).join('')

  renderQuestions(key, currentMark)

  // Show module view
  showView('view-module')
  updateBreadcrumb(mod)

  container.innerHTML = `
    <div class="q-section active">
      <div class="q-section-title">${label} — ${mark} Mark Questions (${questions.length} questions)</div>
      ${questions.map((item, idx) => `
        <div class="q-item" id="q-${modKey}-${mark}-${idx}">
          <div class="q-trigger" onclick="toggleQ('q-${modKey}-${mark}-${idx}')">
            <span class="q-num">Q.${idx + 1}</span>
            <span class="q-text">${item.q}</span>
            <svg class="q-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </div>
          <div class="q-answer">
            <div class="q-answer-inner">${item.a}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `
}

/* ═══════════════════════════════════════════════════════
   TOGGLE QUESTION
═══════════════════════════════════════════════════════ */
function toggleQ(id) {
  const el = document.getElementById(id)
  const wasOpen = el.classList.contains('open')

  // Close all others in this section
  document.querySelectorAll('.q-item.open').forEach(item => {
    if (item.id !== id) item.classList.remove('open')
  })

  el.classList.toggle('open', !wasOpen)
}

/* ═══════════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════════ */
function goBack() {
  showView('view-home')
  document.getElementById('back-btn').style.display = 'none'
  document.getElementById('breadcrumb').innerHTML = ''
  currentModule = null
  setProgress(0)
  window.scrollTo({ top: 0, behavior: 'smooth' })
}

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

/* ═══════════════════════════════════════════════════════
   BREADCRUMB
═══════════════════════════════════════════════════════ */
function updateBreadcrumb(mod) {
  const bc = document.getElementById('breadcrumb')
  bc.innerHTML = `
    <span style="cursor:pointer;color:var(--text2)" onclick="goBack()">Home</span>
    <span class="sep">›</span>
    <span class="crumb-active">${mod.num}</span>
  `
}

/* ═══════════════════════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════════════════════ */
function setProgress(pct) {
  document.getElementById('progress').style.width = pct + '%'
  if (pct >= 100 || pct === 0) {
    setTimeout(() => document.getElementById('progress').style.width = '0', 500)
  }
}

/* ═══════════════════════════════════════════════════════
   START
═══════════════════════════════════════════════════════ */
init()
</script>
</body>
</html>

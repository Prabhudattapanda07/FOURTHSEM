1:{
  title:"Module I",
  sub:"Cyber Law Fundamentals",
  desc:"Cyber Law, Cyberspace, Jurisdiction, Ethics, Domain Names, Governance, ISP",
  color:"var(--acc)",
  marks:{
    2:[
      {q:"What is Cyber Law?",
       a:`Cyber Law is the body of law that governs the use of computers, internet, and digital technologies. It covers electronic transactions, cybercrime, data protection, intellectual property in cyberspace, and digital contracts. In India, the <strong>Information Technology Act, 2000</strong> is the primary legislation for cyber law. It provides legal recognition to electronic records and digital signatures and establishes rules for e-commerce and cybercrime prosecution.`},
      {q:"Define Cyber Space.",
       a:`Cyberspace is the virtual, non-physical environment created by interconnected computer networks, including the internet, where digital communication, transactions, and information exchange take place. It has no geographical boundaries and allows users globally to interact, transact, and share information electronically. Cyberspace includes websites, social media, email systems, cloud storage, and all digital communication platforms.`},
      {q:"What is Cyber Jurisprudence?",
       a:`Cyber Jurisprudence is the study and application of legal theories and principles to issues arising in cyberspace. It examines how existing laws apply to digital environments and how new legal rules should be framed to govern online activities. It deals with questions of jurisdiction, digital rights, online contracts, cybercrimes, and the adaptation of traditional laws to the digital world.`},
      {q:"What is Cyber Ethics?",
       a:`Cyber Ethics refers to the moral principles and guidelines that govern the responsible use of computers, internet, and digital technologies. It includes respecting the privacy of others, protecting intellectual property, avoiding harmful activities like hacking and cyberbullying, behaving responsibly on social media, and maintaining honesty and integrity in all digital interactions. Cyber ethics ensures technology is used for positive and constructive purposes.`},
      {q:"What is a Domain Name?",
       a:`A domain name is the unique, human-readable address of a website on the internet that helps users locate a website easily, replacing the numerical IP address. For example, <strong>www.google.com</strong> and <strong>www.amazon.in</strong> are domain names. They represent the online identity and brand of a business, help customers find websites easily, and are valuable digital assets. Domain name disputes arise when two parties claim the same or similar name.`},
      {q:"What is Web Hosting?",
       a:`Web hosting is a service that provides server space, resources, and connectivity to store website files (HTML pages, images, databases) and make them accessible on the internet 24/7. Web hosting companies maintain powerful servers connected to high-speed internet. Types include shared hosting, dedicated hosting, and cloud hosting. Without web hosting, a website cannot be accessible to users over the internet.`},
      {q:"What is meant by Internet as a global access tool?",
       a:`Internet as a global access tool means the internet enables people anywhere in the world to access information, communicate, conduct business, access government services, and use digital platforms regardless of geographical boundaries. It democratizes information access, supports global e-commerce, enables cross-border communication, and has transformed how individuals and businesses operate globally. It is the primary medium for global digital interaction and commerce.`},
      {q:"What is Cyber Jurisdiction?",
       a:`Cyber Jurisdiction is the legal authority of a court or government body to regulate online activities and adjudicate cyber disputes. Since the internet is borderless and transactions can occur between people in different countries, determining which nation's laws apply to a cyber transaction or cybercrime is a major legal challenge. Cyber jurisdiction deals with questions of which court has authority over online contracts, cybercrimes, domain name disputes, and digital transactions.`},
      {q:"What is meant by Real approach in cyber law?",
       a:`The "Real approach" in cyber law means applying existing traditional (real-world) laws and legal principles to cyberspace activities instead of creating entirely new legislation. Under this approach, laws like the IPC, Indian Evidence Act, and Contract Act are extended and interpreted to cover digital transactions and cybercrimes. For example, IPC Section 420 (cheating) applies to online fraud, and traditional evidence rules are extended to cover digital evidence.`},
      {q:"What is the legal significance of domain names?",
       a:`Domain names have significant legal importance because they serve as digital trademarks that identify businesses online and have substantial commercial value. Legally, domain names can be subject to trademark disputes and cybersquatting cases. Organizations like <strong>WIPO</strong> and <strong>ICANN</strong> resolve domain name disputes under the <strong>UDRP</strong> (Uniform Domain Name Dispute Resolution Policy). Registering a domain similar to a famous brand with intent to profit is legally prohibited as cybersquatting.`},
      {q:"What is meant by Cyberspace Governance?",
       a:`Cyberspace Governance refers to the policies, rules, regulations, and mechanisms established to manage how the internet and digital systems operate. It involves multiple stakeholders including governments, international bodies like ICANN and WIPO, businesses, and individual users. Governance covers internet infrastructure, domain name management, cybercrime laws, data protection rules, net neutrality, and regulation of online content. It aims to maintain order, security, and fairness in cyberspace.`},
      {q:"Define Internet Service Provider (ISP).",
       a:`An Internet Service Provider (ISP) is a company that provides individuals and organizations with access to the internet along with related services such as email hosting, web hosting, and domain registration. ISPs connect users to the internet through broadband, fiber optic, wireless, or satellite connections. Examples in India include <strong>BSNL, Jio, Airtel, and Vodafone</strong>. Under cyber law, ISPs have specific liability protections as intermediaries when third-party illegal content passes through their networks.`},
      {q:"What is meant by Cyber Regulation?",
       a:`Cyber Regulation refers to the rules, policies, and legal frameworks established by governments and international bodies to control, monitor, and manage activities in cyberspace. In India, the <strong>IT Act, 2000</strong> and its amendments form the primary regulatory framework, covering electronic records, digital signatures, e-governance, and cybercrime. Regulations ensure secure digital transactions, protect user data, prevent cybercrime, and establish accountability for online service providers.`},
      {q:"What is meant by Data Privacy in cyberspace?",
       a:`Data privacy in cyberspace means protecting personal, financial, and sensitive information collected, stored, or transmitted digitally from unauthorized access, misuse, or disclosure. It ensures individuals have control over their personal data shared online. Organizations must implement security measures like encryption and access controls to safeguard user data. Data privacy violations â€” such as unauthorized data sharing or breaches â€” are punishable under the IT Act and data protection regulations.`},
      {q:"Write a short note on Internet Protocol (IP) Address.",
       a:`An IP (Internet Protocol) address is a unique numerical label assigned to every device connected to a computer network to identify it and enable data routing. <strong>IPv4</strong> uses 32-bit addresses (e.g., 192.168.1.1) while <strong>IPv6</strong> uses 128-bit addresses to accommodate the growing internet. IP addresses help route data packets between devices across the internet. Domain names replace IP addresses to make websites easier to remember, while DNS servers translate domain names to IP addresses.`},

       a:`The Information Technology Act, 2000 is India's primary legislation governing electronic commerce, digital transactions, and cybercrime. It provides legal recognition to <strong>electronic records and digital signatures</strong>, validates online contracts, defines cyber offences and their penalties, and establishes the framework for e-governance. The Act was amended in 2008 to include provisions on data protection, privacy, and expanded cybercrime definitions including cyberterrorism and identity theft.`},
      {q:"Define Digital Signature.",
       a:`A digital signature is an electronic authentication mechanism that verifies the identity of the sender and ensures the integrity of a digital document. It uses <strong>Public Key Cryptography</strong> â€” the sender signs with a private key and the recipient verifies using the corresponding public key. Under the IT Act, 2000, digital signatures are legally equivalent to handwritten signatures. They are issued by licensed <strong>Certifying Authorities (CAs)</strong> and used in secure digital transactions, e-filing, and online contracts.`},
      {q:"What is Public Key Cryptography?",
       a:`Public Key Cryptography (also called Asymmetric Cryptography) uses a mathematically linked pair of keys â€” a <strong>public key</strong> (shared openly) and a <strong>private key</strong> (kept secret by the owner). Data encrypted with the public key can only be decrypted with the private key and vice versa. It forms the foundation of <strong>digital signatures, SSL/TLS encryption, and secure online communications</strong>. This system eliminates the need to share secret keys over insecure channels.`},
      {q:"What is meant by Electronic Record?",
       a:`An Electronic Record is any data, record, or information generated, stored, transmitted, received, or processed in electronic form using a computer or digital device. Under the <strong>IT Act, 2000</strong>, electronic records have the same legal validity as paper documents. They include emails, digital contracts, websites, databases, and scanned documents. Under Sections 65A and 65B of the Indian Evidence Act, electronic records are admissible as legal evidence in courts with a proper authentication certificate.`},
      {q:"What is a Certifying Authority?",
       a:`A Certifying Authority (CA) is a trusted third-party organization licensed by the <strong>Controller of Certifying Authorities (CCA)</strong> under the IT Act, 2000 to issue, manage, and revoke Digital Signature Certificates (DSC). The CA verifies the identity of applicants and binds their identity to a cryptographic public key. Examples in India include <strong>eMudhra, NSDL e-Governance, and Sify Technologies</strong>. The CCA oversees all licensed CAs in India.`},
      {q:"What is Electronic Governance (E-Governance)?",
       a:`E-Governance is the use of information and communication technology by government agencies to deliver public services, exchange information, and interact with citizens, businesses, and other government departments efficiently and transparently. The IT Act, 2000 provides the legal basis for e-governance in India. Examples include <strong>Aadhaar, DigiLocker, online income tax filing, passport seva portal, and MCA21</strong>. E-governance reduces paperwork, improves transparency, and increases efficiency in public service delivery.`},
      {q:"Define Cyber Crime.",
       a:`Cybercrime refers to any illegal activity carried out using computers, networks, or the internet. It includes <strong>hacking, identity theft, phishing, online fraud, cyber stalking, data theft, ransomware attacks, and spreading malware</strong>. In India, cybercrimes are investigated using the IT Act, 2000 along with the IPC and CrPC. Cybercrime units operate under state police departments to investigate and prosecute offenders. Penalties range from fines to imprisonment depending on severity.`},
      {q:"What is Network Service Provider Liability?",
       a:`Network Service Provider (NSP) Liability refers to the legal responsibility of internet and network service providers for third-party content transmitted, stored, or hosted through their networks and platforms. Under the IT Act, 2000, NSPs are protected from liability (safe harbour provision) if they had no knowledge of the illegal content, did not initiate the transmission, and acted promptly to remove or disable the content upon receiving knowledge of its illegal nature.`},
      {q:"What is Cyber Regulations Appellate Tribunal?",
       a:`The Cyber Regulations Appellate Tribunal (CRAT) is a quasi-judicial body established under the IT Act, 2000 to hear and resolve appeals against orders passed by the Adjudicating Officer in cyber disputes. It functions as the appellate authority for civil disputes arising under the IT Act, including cases involving hacking, data theft, and breach of confidentiality. Parties dissatisfied with the Adjudicating Officer's order can appeal to the CRAT.`},
      {q:"What is meant by Adjudication under IT Act?",
       a:`Adjudication under the IT Act is the process of resolving civil disputes related to cyber offences through a designated government officer called an <strong>Adjudicating Officer</strong> (typically the State IT Secretary). The Adjudicating Officer hears cases involving hacking, data theft, unauthorized access, and breach of confidentiality, and can award compensation up to <strong>â‚¹5 crore</strong>. For amounts above â‚¹5 crore, the case goes to the regular civil court.`},
      {q:"What is meant by Electronic Authentication?",
       a:`Electronic Authentication is the process of verifying the identity of a user, device, or system in a digital environment before granting access to resources or completing a transaction. Methods include <strong>passwords, PINs, OTPs, biometrics, smart cards, and digital signatures</strong>. Under the IT Act, 2000, digital signatures are the legally recognized and most secure form of electronic authentication for contracts and official digital documents.`},
      {q:"Define Secure Electronic Record under the IT Act.",
       a:`A Secure Electronic Record is an electronic record that has been digitally signed using an approved security procedure that satisfies the requirements specified under the IT Act, 2000. It ensures integrity (the record has not been altered) and authenticity (it was created by the stated person). A secure electronic record is presumed to be authentic and admissible in legal proceedings without additional proof of its integrity.`},
      {q:"What is meant by Cyber Fraud?",
       a:`Cyber Fraud is the use of computers, internet, or digital systems to deceive individuals or organizations for financial gain or other benefits through misrepresentation. Common types include <strong>phishing, fake e-commerce websites, online banking fraud, investment scams, and identity theft</strong>. Cyber fraud is punishable under the IT Act, 2000 and <strong>IPC Section 420</strong> (cheating and dishonest inducement). Penalties can include imprisonment and heavy fines.`},
      {q:"What is meant by Intermediary in cyber law?",
       a:`Under the IT Act, 2000, an Intermediary is any person or entity that on behalf of another receives, stores, or transmits electronic records through a computer network â€” including ISPs, social media platforms, search engines, online marketplaces, and app stores. Intermediaries have <strong>limited liability</strong> (safe harbour protection) under Section 79 of the IT Act, provided they do not initiate transmissions, follow due diligence guidelines, and promptly remove illegal content upon notice.`},
      {q:"What is meant by Data Protection in electronic systems?",
       a:`Data Protection in electronic systems refers to the legal, technical, and organizational measures implemented to safeguard personal, financial, and sensitive digital information from unauthorized access, misuse, loss, or breach. Methods include <strong>encryption, access controls, firewalls, secure backups, and privacy policies</strong>. In India, the IT Act, 2000 (Section 43A) requires organizations handling sensitive personal data to implement reasonable security practices; failure can result in liability for compensation to affected users.`},
    ]
  }
},

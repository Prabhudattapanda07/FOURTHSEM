<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question Bank Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a1020;
      --bg-soft: #121a31;
      --panel: rgba(15, 23, 42, 0.78);
      --panel-border: rgba(148, 163, 184, 0.2);
      --text: #e8eefc;
      --muted: #a6b2d1;
      --iot-a: #38bdf8;
      --iot-b: #22d3ee;
      --cle-a: #f97316;
      --cle-b: #facc15;
      --shadow: 0 24px 60px rgba(2, 6, 23, 0.45);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(249, 115, 22, 0.2), transparent 28%),
        linear-gradient(145deg, var(--bg), var(--bg-soft));
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }

    .shell {
      width: min(1024px, 100%);
      background: rgba(10, 16, 32, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .hero {
      padding: 56px 24px 28px;
      text-align: center;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.04);
      color: #c8d7fb;
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 700;
    }

    h1 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(2.2rem, 6vw, 4.6rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      max-width: 9ch;
      margin: 0 auto 18px;
    }

    .hero p {
      max-width: 640px;
      margin: 0 auto;
      font-size: 1.02rem;
      line-height: 1.8;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
      padding: 18px 24px 32px;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 270px;
      padding: 28px;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.12), transparent 45%);
      opacity: 0.6;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 24px 40px rgba(15, 23, 42, 0.45);
    }

    .iot:hover {
      border-color: rgba(34, 211, 238, 0.45);
    }

    .cle:hover {
      border-color: rgba(250, 204, 21, 0.45);
    }

    .label {
      display: inline-flex;
      align-self: flex-start;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .iot .label {
      background: rgba(34, 211, 238, 0.12);
      color: #7dd3fc;
    }

    .cle .label {
      background: rgba(250, 204, 21, 0.12);
      color: #fcd34d;
    }

    .card h2 {
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.9rem;
      line-height: 1.1;
      margin-bottom: 14px;
    }

    .card p {
      color: var(--muted);
      line-height: 1.75;
      font-size: 0.98rem;
      max-width: 36ch;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 28px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .iot .cta {
      color: #7dd3fc;
    }

    .cle .cta {
      color: #fdba74;
    }

    .arrow {
      width: 38px;
      height: 38px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.08);
    }

    .footer-note {
      padding: 0 24px 34px;
      text-align: center;
      color: #8fa0c6;
      font-size: 0.92rem;
    }

    @media (max-width: 760px) {
      .hero {
        padding: 42px 20px 16px;
      }

      .grid {
        grid-template-columns: 1fr;
        padding: 12px 20px 24px;
      }

      .card {
        min-height: 230px;
      }

      .footer-note {
        padding: 0 20px 28px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <span class="eyebrow">Academic Portal</span>
      <h1>Choose Your Question Bank</h1>
  
    </section>

    <section class="grid">
      <a class="card iot" href="IOT.html">
        <div>
          <span class="label">IOT</span>
          <h2>Internet of Things</h2>
          <p>Access the IoT end semester question bank with its existing sections and content.</p>
        </div>
        <span class="cta">Open IOT Page <span class="arrow">→</span></span>
      </a>

      <a class="card cle" href="CLE.html">
        <div>
          <span class="label">CLE</span>
          <h2>Cyber Law and Ethics</h2>
          <p>Go to the CLE question bank page for cyber law and ethics study material.</p>
        </div>
        <span class="cta">Open CLE Page <span class="arrow">→</span></span>
      </a>
    </section>


  </main>
</body>
</html>
